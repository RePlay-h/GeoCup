version: '3.8'

services:
  data-pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: python main.py

  tile-generator:
    build:
      context: .
      dockerfile: Dockerfile.tiles
    volumes:
      - ./data:/app/data
      - ./client/public/data:/app/client/public/data
    environment:
      - PYTHONUNBUFFERED=1
    command: python tile.py

  frontend:
    build:
      context: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host